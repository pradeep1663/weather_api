<!DOCTYPE html>
{%load static%}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'index.css' %}">
    
</head>
<body>
    <div class="card">
       <form method="GET">
    <div class="search">
        <input
            type="text"
            name="city"
            placeholder="Enter City Name"
            spellcheck="false">

        <button type="submit">
            <img src="{% static 'images/search.png' %}">
        </button>
    </div>
</form>
    
        {% if error %}
<div class="error">
    <p>{{ error }}</p>
</div>
{% endif %}
<p class="date">{{ date }}</p>
        <div class="weather">
            <img src="{% static 'images/' %}{{ icon }}" class="weather-icon">
            <h1 class="temp">{{temp}}°C</h1> 
            <h2 class="city">{{city}}</h2>
            <p>{{ description }}</p>
            <div class="details">
                <div class="col">
                    <img src="{% static 'images/humidity1.png' %}">
                    <div>
                        <p class="humidity">{{humidity}}%</p>
                        <p>Humidity</p>
                        
                    </div>
                </div>
                <div class="col">
                    <img src="{% static 'images/wind1.png' %}">
                    <div>
                        <p class="wind"> {{wind}}km/h</p>
                        <p>Wind</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
